<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Vue Lab - Profile Card</title>
</head>
<body>
	<div id="app">
		<h1>{{ greeting }}</h1>
	</div>

	<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

	<script>
		const { createApp, ref } = Vue

		createApp({
			setup() {
				const greeting = ref('Hello from Vue 3!')
				return { greeting }
			}
		}).mount('#app')
	</script>

</body>
</html>
