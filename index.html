<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Vue Lab - Profile Card</title>

	<style>
		body { font-family: system-ui, sans-serif; background: #F5F7FA;
			margin: 0; padding: 2rem; transition: background .3s; }
			#app { max-width: 420px; margin: 0 auto; }
			.card {
				background: #FFFFFF; border-radius: 16px; padding: 2rem;
				box-shadow: 0 8px 24px rgba(0,0,0,.08); text-align: center;
				transition: background .3s, color .3s;
			}
			.avatar { width: 120px; height: 120px; border-radius: 50%;
				border: 4px solid #42B883; }
				.title { color: #42B883; font-weight: 600; margin: .25rem 0 1rem; }
				.bio { color: #64748B; font-size: .95rem; }
				/* Dark theme */
				.dark { }
				.dark .card { background: #1E293B; color: #F1F5F9; }
				.dark body, body.dark { background: #0F172A; }
			.dark .bio { color: #94A3B8; }

			.editor {
				background: #FFFFFF; padding: 1.5rem; border-radius: 16px;
				margin-top: 1rem; box-shadow: 0 4px 12px rgba(0,0,0,.06);
			}
			.editor h3 { margin-top: 0; color: #35495E; }
			.editor label { display: block; margin: .75rem 0; font-size: .9rem; }
			.editor input[type=text], .editor textarea {
				width: 100%; padding: .5rem; border: 1px solid #CBD5E1;
				border-radius: 6px; font-size: 1rem; margin-top: .25rem;
			}
			.dark .editor { background: #1E293B; color: #F1F5F9; }
			
		</style>
</head>
<body>
	<div id="app" :class="{ dark: darkMode }">
		<section class="card">
			<img :src="avatar" :alt="name" class="avatar">
			<h2>{{ name }}</h2>
			<p class="title">{{ title }}</p>
			<p class="bio">{{ bio }}</p>
		</section>

		<section class="editor">
			<h3>Edit Profile</h3>
			<label>Name:
				<input v-model="name" type="text">
			</label>
			<label>Title
				<input v-model="title" type="text">
			</label>
			<label>Bio:
				<textarea v-model="bio" rows="3"></textarea>
			</label>

		    <label>
		    	<input type="checkbox" v-model="darkMode"> Dark mode
		    </label>
		</section>


	</div>

	<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

	<script>
		const { createApp, ref } = Vue

		createApp({
			setup() {
				const name = ref('Nur Aisyah')
				const title = ref('Full-Stack Developer')
				const bio = ref('Loves-Vue, coffee, and open-source')
				const avatar = ref ('https://i.pravatar.cc/200?img=47')
				const darkMode = ref(false)

				return { name, title, bio, avatar, darkMode }
			}
		}).mount('#app')
	</script>

</body>
</html>
